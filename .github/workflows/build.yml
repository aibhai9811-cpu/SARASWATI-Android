name: Build SARASWATI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Vosk Small English-India Model
      run: |
        mkdir -p app/src/main/assets
        echo "Downloading Vosk model..."
        wget -q "https://alphacephei.com/vosk/models/vosk-model-small-en-in-0.4.zip" -O vosk-model.zip
        unzip -q vosk-model.zip -d app/src/main/assets/
        mv app/src/main/assets/vosk-model-small-en-in-0.4 app/src/main/assets/vosk-model-small-en-in
        echo "SARASWATI Vosk Model" > app/src/main/assets/vosk-model-small-en-in/README
        echo "Model size: $(du -sh app/src/main/assets/vosk-model-small-en-in | cut -f1)"

    - name: Build APK
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
        unzip -q gradle-8.1.1-bin.zip
        GRADLE=$(pwd)/gradle-8.1.1/bin/gradle
        chmod +x $GRADLE
        $GRADLE assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SARASWATI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
