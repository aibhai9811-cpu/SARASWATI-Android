name: Build SARASWATI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Show repo structure
      run: find . -maxdepth 4 -name "*.gradle" -o -name "settings.gradle" | head -20

    - name: Build APK
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
        unzip -q gradle-8.1.1-bin.zip
        GRADLE=./gradle-8.1.1/bin/gradle
        # Find where settings.gradle is
        SETTINGS=$(find . -name "settings.gradle" | head -1)
        BUILD_DIR=$(dirname "$SETTINGS")
        echo "Found build dir: $BUILD_DIR"
        cd "$BUILD_DIR"
        $OLDPWD/$GRADLE assembleDebug

    - name: Find and upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SARASWATI-APK
        path: "**/app-debug.apk"
