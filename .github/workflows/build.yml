name: Build SARASWATI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Show full repo structure
      run: |
        echo "=== ROOT FILES ==="
        ls -la
        echo "=== ALL GRADLE FILES ==="
        find . -name "*.gradle" | sort
        echo "=== SETTINGS FILES ==="
        find . -name "settings.gradle" | sort

    - name: Build APK
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
        unzip -q gradle-8.1.1-bin.zip
        GRADLE=$(pwd)/gradle-8.1.1/bin/gradle
        chmod +x $GRADLE
        # Run from repo root where settings.gradle should be
        $GRADLE assembleDebug --stacktrace

    - name: Find APK
      run: find . -name "*.apk" | sort

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SARASWATI-APK
        path: "**/*.apk"
