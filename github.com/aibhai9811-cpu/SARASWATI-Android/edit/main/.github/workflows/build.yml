name: Build SARASWATI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
        unzip -q gradle-8.1.1-bin.zip
        export PATH=$PATH:$(pwd)/gradle-8.1.1/bin
        echo "PATH=$(pwd)/gradle-8.1.1/bin:$PATH" >> $GITHUB_ENV

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SARASWATI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
